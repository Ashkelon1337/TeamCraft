version: '3.8'
services:
  web:
    build: .
    ports:
      - '8000:8000'

    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: 'service_healthy'
    networks:
      - fast-network
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: $DB_USER
      POSTGRES_PASSWORD: $DB_PASS
      POSTGRES_DB: $DB_NAME
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U $DB_USER -d $DB_NAME']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fast-network


volumes:
  postgres_data:

networks:
  fast-network:
    driver: bridge